spring:
  application:
    name: populace-api

  datasource:
    url: jdbc:postgresql://localhost:5432/Populace
    username: postgres
    password: admin123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8002
  error:
    include-message: always
    include-stacktrace: always

populace:
  jwt:
    secret: populace-jwt-secret-key-min-32-characters-long
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3002,http://localhost:3000,http://18.60.109.54:3002

logging:
  level:
    root: INFO
    com.populace: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
